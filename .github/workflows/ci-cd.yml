name: AML Core CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # --- MANUAL TRIGGER ---
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push Docker image to registry?'
        required: true
        type: boolean
        default: false

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run Unit & Integration Tests
      run: mvn clean test

    - name: Build with Maven
      run: mvn package -DskipTests

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar

  docker-build:
    name: Build Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    # Run if pushed to main OR if manually triggered
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') || 
      (github.event_name == 'workflow_dispatch')

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: target/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      # Only login if we actually intend to push
      if: github.event.inputs.push_image == 'true' || github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        # Logic: Push if it's a 'push' event to main OR if manual input 'push_image' is true
        push: ${{ github.event_name == 'push' || github.event.inputs.push_image == 'true' }}
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/aml-core-engine:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/aml-core-engine:${{ github.sha }}
