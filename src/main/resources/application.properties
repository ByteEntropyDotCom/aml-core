# ===============================================================
# BASIC APPLICATION SETTINGS
# ===============================================================
spring.application.name=aml-core
server.port=8080

# ===============================================================
# JAVA 21 PERFORMANCE (VIRTUAL THREADS)
# ===============================================================
spring.threads.virtual.enabled=true

# ===============================================================
# CUSTOM REDIS CONFIGURATION (MANUAL OVERRIDE)
# ===============================================================
# Defaults to localhost for Docker Desktop / local Redis installations
custom.redis.host=${REDIS_HOST:localhost}
custom.redis.port=${REDIS_PORT:6379}
custom.redis.username=${REDIS_USER:default}
custom.redis.password=${REDIS_PASSWORD:}

# Disable repositories to avoid startup overhead; we use StringRedisTemplate directly
spring.data.redis.repositories.enabled=false

# ===============================================================
# AML BUSINESS RULES
# ===============================================================
aml.rules.velocity.threshold=10
aml.rules.velocity.window-seconds=120
aml.rules.high-value.limit=10000.00

# ===============================================================
# MONITORING & LOGGING
# ===============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.com.byteentropy.aml_core=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================================================
# ASYNC TASK EXECUTOR
# ===============================================================
spring.task.execution.pool.core-size=8
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=10000
spring.task.execution.thread-name-prefix=aml-worker-